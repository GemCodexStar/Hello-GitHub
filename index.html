<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GemCodexStar 的主页</title>
    <style>
        /* 这里就是 CSS，负责网页的样式 */
        body {
            background-color: #f0f4f8; /* 浅蓝色背景 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 0.5rem;
        }
        p {
            color: #718096;
            line-height: 1.6;
        }
        .button {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .button:hover {
            background-color: #3182ce;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 这里的风景不错！</h1>
        <p>你好，我是 <b>GemCodexStar</b>。<br>这是我亲手通过代码设计的第一个网页卡片。</p>
        <a href="https://github.com/GemCodexStar" class="button">访问我的 GitHub 个人主页</a>
    </div>
</body>
</html>
